title = "manid2.github.io"
languageCode = "en-us"
paginate = 20
canonifyurls = true

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

[params]
  keywords = ["Blog", "Portfolio", "PaperMod", "Projects"]
  author = "Mani Kumar"
  images = "/images/awesome_author.svg"
  showBreadCrumbs = true

  [params.assets]
    favicon = "/images/awesome_author.svg"

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    hl_inline = false
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = false
    noClasses = false
